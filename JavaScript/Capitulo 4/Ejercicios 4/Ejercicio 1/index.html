<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Cofla 1</title>
    <script src="codigo.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card card--calculadora">
        <div class="card__div visor--calculadora" id="visor">

        </div>
        <div class="card__div div--botones" id="botones">
            <button class="div__button button--1" id="button-1">1</button>
            <button class="div__button button--2" id="button-2">2</button>
            <button class="div__button button--3" id="button-3">3</button>
            <button class="div__button button--4" id="button-4">4</button>
            <button class="div__button button--5" id="button-5">5</button>
            <button class="div__button button--6" id="button-6">6</button>
            <button class="div__button button--7" id="button-7">7</button>
            <button class="div__button button--8" id="button-8">8</button>
            <button class="div__button button--9" id="button-9">9</button>
        </div>
        <div class="card_div div--operaciones" id="operaciones">
            <button class="div__button button--sumar" id="button--sumar">+</button>
            <button class="div__button button--restar" id="button--restar">-</button>
            <button class="div__button button--multiplicar" id="button--multiplicar">x</button>
            <button class="div__button button--dividir" id="button--dividir">/</button>
            <button class="div__button button--potenciar" id="button--potenciar">^</button>
            <button class="div__button button--raiz-cuadrada" id="button--raiz-cuadrada">√</button>
            <button class="div__button button--sumar" id="button--sumar">∛</button>
        </div>
    </div>
</body>
</html>
